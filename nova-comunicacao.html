<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIBUC - Nova Comunicação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo-placeholder">
            <img class="logo" src="imgs/logo-header.png" alt="Logo do SIBUC">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="unidades.html">Unidades</a></li>
                <li><a href="comunicacoes.html">Comunicações</a></li>
                <li><a href="contatos.html">Contatos</a></li>
            </ul>
        </nav>
        <a href="nova-comunicacao.html" class="btn-nova-comunicacao">
            <i class="fa-regular fa-comment-dots"></i> Nova Comunicação
        </a>
    </header>

    <main class="main-container">
        <div class="form-card">
            
            <section class="form-header">
                <h1>NOVA COMUNICAÇÃO</h1>
                <p>Envie sua denúncia, sugestão ou informação sobre a unidade de conservação.</p>
            </section>

            <!-- Mudei aqui: action aponta para o PHP, method POST normal -->
            <form action="backend/enviar_comunicacao.php" method="POST" id="formComunicacao">
                
                <div class="form-group">
                    <label for="titulo">Título <span class="required">*</span></label>
                    <input type="text" id="titulo" name="titulo" placeholder="Digite o título da comunicação" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição <span class="required">*</span></label>
                    <textarea id="descricao" name="descricao" rows="6" placeholder="Descreva sua denúncia, sugestão ou informação.." required></textarea>
                </div>

                <div class="form-group">
                    <label for="email">E-mail <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="unidade">Unidade de conservação <span class="required">*</span></label>
                    <div class="select-wrapper">
                        <select id="unidade" name="unidade_id" required>
                            <option value="" disabled selected hidden>Carregando unidades...</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-submit">ENVIAR COMUNICAÇÃO</button>
            </form>

            <div class="back-container">
                <a href="unidades.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Voltar para unidades</a>
            </div>

        </div>
    </main>

    <footer>
        <div class="logo-placeholder footer-logo">
            <img class="logo-footer" src="imgs/logo-footer.png" alt="Logo do SIBUC">
        </div>
        
        <div class="footer-contacts">
            <a href="mailto:contato@sibuc.com.br"><i class="fa-regular fa-envelope"></i> contato@sibuc.com.br</a>
            <a href="tel:+5547912345678"><i class="fa-solid fa-phone"></i> (47) 9 1234-5678</a>
        </div>

        <div class="footer-socials">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        </div>
    </footer>

    <script>
        // Carregar as unidades do banco para preencher o select
        async function carregarUnidades() {
            try {
                const resposta = await fetch('backend/listar_unidades.php');
                const dados = await resposta.json();
                
                if (dados.success && dados.unidades.length > 0) {
                    const select = document.getElementById('unidade');
                    select.innerHTML = '<option value="" disabled selected hidden>Selecione uma unidade</option>';
                    
                    dados.unidades.forEach(unidade => {
                        select.innerHTML += `
                            <option value="${unidade.id}">${unidade.nome}</option>
                        `;
                    });
                } else {
                    document.getElementById('unidade').innerHTML = '<option disabled>Nenhuma unidade disponível</option>';
                }
            } catch (error) {
                console.error('Erro ao carregar unidades:', error);
            }
        }

        // Mostrar mensagem de sucesso após o envio (usando GET parameter)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === '1') {
            alert('✅ Comunicação enviada com sucesso! Em breve será analisada.');
            // Limpar URL sem recarregar a página
            window.history.replaceState({}, '', 'nova-comunicacao.html');
        } else if (urlParams.get('error')) {
            alert('❌ Erro ao enviar: ' + decodeURIComponent(urlParams.get('error')));
            window.history.replaceState({}, '', 'nova-comunicacao.html');
        }

        // Carregar unidades quando a página abrir
        carregarUnidades();
    </script>

</body>
</html>
